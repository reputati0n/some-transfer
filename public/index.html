<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>文件分享系统</title>
  <link rel="icon" type="image/svg+xml" href="/assets/app-icon.svg">
  <link rel="apple-touch-icon" href="/assets/app-icon.svg">
  <script>
    (() => {
      const themeStorageKey = 'some-transfer:theme-mode';
      const allowedThemes = new Set(['light', 'dark', 'system']);
      let themePreference = 'system';

      try {
        const storedTheme = localStorage.getItem(themeStorageKey);
        if (allowedThemes.has(storedTheme)) {
          themePreference = storedTheme;
        }
      } catch (error) {
        themePreference = 'system';
      }

      const systemPrefersDark = window.matchMedia &&
        window.matchMedia('(prefers-color-scheme: dark)').matches;
      const resolvedTheme = themePreference === 'system'
        ? (systemPrefersDark ? 'dark' : 'light')
        : themePreference;

      document.documentElement.dataset.theme = resolvedTheme;
      document.documentElement.dataset.themePreference = themePreference;
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe8;
      --page-bg: linear-gradient(145deg, #f7f1e8 0%, #eee7de 52%, #ebe6de 100%);
      --panel: rgba(255, 251, 245, 0.94);
      --panel-strong: rgba(255, 255, 255, 0.96);
      --line: rgba(102, 83, 57, 0.12);
      --text: #1d1b18;
      --muted: #6f675e;
      --accent: #cc6f39;
      --accent-deep: #a74f1d;
      --danger: #c94635;
      --danger-deep: #9d301f;
      --blue: #2d78bf;
      --green: #2f7c4b;
      --chip-bg: rgba(255, 255, 255, 0.72);
      --chip-border: rgba(102, 83, 57, 0.08);
      --field-bg: rgba(255, 255, 255, 0.84);
      --field-border: rgba(102, 83, 57, 0.12);
      --soft-surface: rgba(255, 255, 255, 0.62);
      --soft-button: rgba(29, 27, 24, 0.08);
      --soft-button-hover: rgba(29, 27, 24, 0.12);
      --modal-surface: rgba(255, 251, 245, 0.96);
      --modal-border: rgba(255, 255, 255, 0.36);
      --modal-close-bg: rgba(29, 27, 24, 0.08);
      --modal-close-hover: rgba(29, 27, 24, 0.14);
      --overlay-bg: rgba(29, 27, 24, 0.74);
      --confirm-overlay-bg: rgba(29, 27, 24, 0.72);
      --image-wrap-bg: linear-gradient(135deg, rgba(247, 241, 232, 0.96), rgba(236, 229, 221, 0.92));
      --empty-bg: rgba(255, 255, 255, 0.66);
      --empty-border: rgba(102, 83, 57, 0.16);
      --error-text: #8f2619;
      --shadow-lg: 0 18px 42px rgba(60, 41, 24, 0.1);
      --shadow-md: 0 10px 24px rgba(60, 41, 24, 0.08);
      --item-surface: rgba(255, 252, 247, 0.96);
      --item-shadow: 0 6px 18px rgba(60, 41, 24, 0.06);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #111312;
      --page-bg: linear-gradient(145deg, #101312 0%, #171917 50%, #20201c 100%);
      --panel: rgba(29, 31, 29, 0.94);
      --panel-strong: rgba(36, 38, 35, 0.96);
      --line: rgba(235, 226, 214, 0.14);
      --text: #f4eee6;
      --muted: #bdb3a6;
      --accent: #e08a51;
      --accent-deep: #b96736;
      --danger: #df6958;
      --danger-deep: #b84433;
      --blue: #7bb7f0;
      --green: #79c995;
      --chip-bg: rgba(255, 255, 255, 0.07);
      --chip-border: rgba(235, 226, 214, 0.1);
      --field-bg: rgba(255, 255, 255, 0.08);
      --field-border: rgba(235, 226, 214, 0.14);
      --soft-surface: rgba(255, 255, 255, 0.08);
      --soft-button: rgba(255, 255, 255, 0.08);
      --soft-button-hover: rgba(255, 255, 255, 0.13);
      --modal-surface: rgba(28, 30, 28, 0.98);
      --modal-border: rgba(235, 226, 214, 0.14);
      --modal-close-bg: rgba(255, 255, 255, 0.1);
      --modal-close-hover: rgba(255, 255, 255, 0.16);
      --overlay-bg: rgba(5, 6, 6, 0.78);
      --confirm-overlay-bg: rgba(5, 6, 6, 0.76);
      --image-wrap-bg: linear-gradient(135deg, rgba(18, 20, 19, 0.96), rgba(35, 34, 30, 0.92));
      --empty-bg: rgba(255, 255, 255, 0.06);
      --empty-border: rgba(235, 226, 214, 0.18);
      --error-text: #ffb2a5;
      --shadow-lg: 0 18px 42px rgba(0, 0, 0, 0.34);
      --shadow-md: 0 10px 24px rgba(0, 0, 0, 0.28);
      --item-surface: rgba(31, 33, 31, 0.96);
      --item-shadow: 0 6px 18px rgba(0, 0, 0, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", sans-serif;
      color: var(--text);
      background: var(--page-bg);
      padding: 24px;
    }

    .container {
      max-width: 1380px;
      margin: 0 auto;
    }

    .hero {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
      gap: 22px;
      margin-bottom: 24px;
    }

    .hero-card,
    .status-card,
    .composer {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-md);
    }

    .hero-card,
    .status-card,
    .composer {
      border-radius: var(--radius-xl);
    }

    .hero-card {
      padding: 34px;
      position: relative;
      overflow: hidden;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--chip-bg);
      border: 1px solid var(--chip-border);
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(204, 111, 57, 0.12);
    }

    .hero-brand {
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 5vw, 64px);
      line-height: 0.98;
      letter-spacing: -0.05em;
    }

    .hero p {
      margin: 0;
      max-width: 42rem;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.8;
    }

    .hero-actions {
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 999px;
      background: var(--chip-bg);
      border: 1px solid var(--chip-border);
      color: var(--muted);
      font-size: 14px;
    }

    .status-card {
      position: relative;
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 100%;
    }

    .status-card h2 {
      margin: 0 0 12px;
      font-size: 28px;
      letter-spacing: -0.04em;
    }

    .status-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin: 24px 0 18px;
    }

    .stat {
      padding: 16px;
      border-radius: 20px;
      background: var(--chip-bg);
      border: 1px solid var(--chip-border);
    }

    .stat strong {
      display: block;
      font-size: 28px;
      letter-spacing: -0.05em;
      margin-bottom: 4px;
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
    }

    .logout-btn,
    .clear-btn,
    .refresh-btn,
    .upload-label,
    .composer-submit,
    .file-download,
    .image-preview-btn,
    .copy-btn,
    .delete-btn,
    .expand-btn {
      border: none;
      cursor: pointer;
      transition: box-shadow 0.16s ease, opacity 0.16s ease, background 0.16s ease;
      font-family: inherit;
    }

    .logout-btn {
      align-self: flex-start;
      padding: 12px 16px;
      border-radius: 16px;
      color: white;
      background: linear-gradient(135deg, var(--danger) 0%, var(--danger-deep) 100%);
      box-shadow: 0 10px 20px rgba(157, 48, 31, 0.16);
      font-size: 14px;
      font-weight: 600;
    }

    .status-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .theme-switcher {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border-radius: 16px;
      background: var(--soft-surface);
      border: 1px solid var(--line);
    }

    .theme-option {
      min-height: 34px;
      padding: 0 12px;
      border: none;
      border-radius: 12px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.16s ease, color 0.16s ease, box-shadow 0.16s ease;
    }

    .theme-option:hover {
      color: var(--text);
    }

    .theme-option.active {
      background: var(--panel-strong);
      color: var(--text);
      box-shadow: var(--item-shadow);
    }

    .logout-btn:hover,
    .clear-btn:hover,
    .refresh-btn:hover,
    .upload-label:hover,
    .composer-submit:hover,
    .file-download:hover,
    .image-preview-btn:hover,
    .copy-btn:hover,
    .delete-btn:hover {
      box-shadow: var(--shadow-md);
    }

    .composer {
      padding: 22px;
      margin-bottom: 22px;
    }

    .composer-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .composer-top h2 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.04em;
    }

    .composer-top p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .composer-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
    }

    .composer-actions {
      display: grid;
      gap: 12px;
      align-self: stretch;
    }

    .text-input {
      width: 100%;
      height: 136px;
      padding: 16px 18px;
      border-radius: 20px;
      border: 1px solid var(--field-border);
      background: var(--field-bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.8;
      resize: none;
      tab-size: 2;
      outline: none;
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .text-input:focus {
      border-color: rgba(204, 111, 57, 0.72);
      box-shadow: 0 0 0 5px rgba(204, 111, 57, 0.12);
    }

    .file-upload input[type="file"] {
      display: none;
    }

    .upload-label,
    .composer-submit,
    .file-download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 58px;
      align-self: start;
      padding: 0 20px;
      border-radius: 20px;
      color: white;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
    }

    .upload-label {
      background: linear-gradient(135deg, #275f93 0%, #2d78bf 100%);
      box-shadow: 0 10px 20px rgba(45, 120, 191, 0.16);
    }

    .composer-submit {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
      box-shadow: 0 10px 22px rgba(167, 79, 29, 0.16);
    }

    .composer-submit:disabled,
    .upload-label.disabled {
      opacity: 0.7;
      pointer-events: none;
    }

    .selected-file {
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .error-message {
      margin-bottom: 18px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(201, 70, 53, 0.12);
      border: 1px solid rgba(201, 70, 53, 0.16);
      color: var(--error-text);
      display: none;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toolbar h3 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.04em;
    }

    .toolbar span {
      color: var(--muted);
      font-size: 14px;
    }

    .refresh-btn {
      min-height: 46px;
      padding: 0 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, #275f93 0%, #2d78bf 100%);
      color: white;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      box-shadow: 0 10px 20px rgba(45, 120, 191, 0.16);
    }

    .clear-btn {
      min-height: 46px;
      padding: 0 16px;
      border-radius: 16px;
      color: white;
      background: linear-gradient(135deg, var(--danger) 0%, var(--danger-deep) 100%);
      box-shadow: 0 10px 20px rgba(157, 48, 31, 0.16);
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
    }

    .refresh-btn:disabled {
      cursor: not-allowed;
      opacity: 0.62;
    }

    .clear-btn:disabled {
      cursor: not-allowed;
      opacity: 0.62;
    }

    .content-grid {
      column-width: 320px;
      column-gap: 18px;
      min-height: 120px;
    }

    .content-grid.is-empty {
      column-count: 1;
      column-width: auto;
    }

    .item {
      position: relative;
      display: inline-block;
      width: 100%;
      margin: 0 0 18px;
      padding: 22px;
      border-radius: 24px;
      background: var(--item-surface);
      border: 1px solid var(--line);
      box-shadow: var(--item-shadow);
      break-inside: avoid;
      contain: content;
      content-visibility: auto;
      contain-intrinsic-size: 360px;
      overflow: hidden;
    }

    .item-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--chip-bg);
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .item-text {
      line-height: 1.8;
      font-size: 15px;
      padding-right: 6px;
      max-height: calc(1.8em * 10);
      overflow: hidden;
      overflow-wrap: anywhere;
      white-space: break-spaces;
    }

    .item-text.expanded {
      max-height: none;
      overflow: visible;
    }

    .item-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .expand-btn,
    .copy-btn,
    .delete-btn {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 600;
    }

    .copy-btn {
      background: rgba(45, 120, 191, 0.12);
      color: var(--blue);
    }

    .copy-btn.copied {
      background: rgba(72, 160, 106, 0.15);
      color: var(--green);
    }

    .copy-btn:disabled {
      cursor: wait;
      opacity: 0.62;
    }

    .expand-btn {
      display: none;
      background: rgba(204, 111, 57, 0.12);
      color: var(--accent-deep);
    }

    .expand-btn.visible {
      display: inline-flex;
      align-items: center;
    }

    .delete-btn {
      position: absolute;
      top: 18px;
      right: 18px;
      background: rgba(201, 70, 53, 0.12);
      color: var(--danger);
    }

    .item-file {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background: var(--overlay-bg);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.16s ease;
    }

    .lightbox.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox-panel {
      position: relative;
      width: min(100%, 1120px);
      max-height: 100%;
      padding: 18px 18px 14px;
      border-radius: 28px;
      background: var(--modal-surface);
      border: 1px solid var(--modal-border);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .lightbox-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 999px;
      background: var(--modal-close-bg);
      color: var(--text);
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.16s ease;
    }

    .lightbox-close:hover {
      background: var(--modal-close-hover);
    }

    .lightbox-figure {
      margin: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .lightbox-image-wrap {
      min-height: 0;
      max-height: calc(100vh - 170px);
      border-radius: 22px;
      overflow: hidden;
      background: var(--image-wrap-bg);
      display: grid;
      place-items: center;
    }

    .lightbox-image {
      max-width: 100%;
      max-height: calc(100vh - 170px);
      object-fit: contain;
      display: block;
    }

    .lightbox-caption {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      padding: 0 4px;
    }

    .lightbox-caption strong {
      color: var(--text);
      display: block;
      font-size: 16px;
      word-break: break-word;
    }

    .lightbox-hint {
      white-space: nowrap;
    }

    .confirm-modal {
      position: fixed;
      inset: 0;
      z-index: 1100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--confirm-overlay-bg);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.16s ease;
    }

    .confirm-modal.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .confirm-panel {
      width: min(100%, 560px);
      padding: 26px;
      border-radius: 28px;
      background: var(--modal-surface);
      border: 1px solid var(--modal-border);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.22);
      position: relative;
    }

    .confirm-title {
      margin: 0 0 10px;
      font-size: 24px;
      letter-spacing: -0.04em;
    }

    .confirm-body {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
    }

    .confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 22px;
    }

    .confirm-btn {
      min-height: 46px;
      padding: 0 16px;
      border: none;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: box-shadow 0.16s ease, opacity 0.16s ease, background 0.16s ease;
      font-family: inherit;
    }

    .confirm-btn:disabled {
      opacity: 0.62;
      cursor: not-allowed;
    }

    .confirm-cancel {
      background: var(--soft-button);
      color: var(--text);
    }

    .confirm-cancel:hover {
      background: var(--soft-button-hover);
    }

    .confirm-danger {
      color: white;
      background: linear-gradient(135deg, var(--danger) 0%, var(--danger-deep) 100%);
      box-shadow: 0 10px 20px rgba(157, 48, 31, 0.16);
    }

    .confirm-danger:hover {
      box-shadow: 0 14px 28px rgba(157, 48, 31, 0.22);
    }

    .confirm-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 999px;
      background: var(--modal-close-bg);
      color: var(--text);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.16s ease;
    }

    .confirm-close:hover {
      background: var(--modal-close-hover);
    }

    .file-meta {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .file-meta strong {
      color: var(--text);
      font-size: 16px;
      word-break: break-word;
    }

    .file-download {
      width: fit-content;
      background: linear-gradient(135deg, #275f93 0%, #2d78bf 100%);
      box-shadow: 0 10px 20px rgba(45, 120, 191, 0.16);
    }

    .file-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .image-preview-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      padding: 0 20px;
      border-radius: 20px;
      background: rgba(204, 111, 57, 0.12);
      color: var(--accent-deep);
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
    }

    .item-time {
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    .empty-state {
      display: block;
      width: 100%;
      padding: 60px 28px;
      break-inside: avoid;
      text-align: center;
      border-radius: 28px;
      background: var(--empty-bg);
      border: 1px dashed var(--empty-border);
      color: var(--muted);
      line-height: 1.8;
    }

    @media (max-width: 1120px) {
      .hero {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 860px) {
      body {
        padding: 16px;
      }

      .composer-form {
        grid-template-columns: 1fr;
      }

      .upload-label,
      .composer-submit {
        width: 100%;
      }

      .stats {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .hero-card,
      .status-card,
      .composer,
      .item {
        border-radius: 22px;
      }

      .hero-card,
      .status-card,
      .composer,
      .item {
        padding-left: 18px;
        padding-right: 18px;
      }

      .hero-card {
        padding-top: 24px;
        padding-bottom: 24px;
      }

      .status-card,
      .composer,

        padding-top: 20px;
        padding-bottom: 20px;
      }

      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar-actions,
      .refresh-btn,
      .clear-btn {
        width: 100%;

      .status-actions,

      .lightbox {

      }

      .lightbox-panel {
        width: 100%;
        padding: 14px 14px 12px;
        border-radius: 22px;
      }

      .lightbox-image-wrap,
      .lightbox-image {
        max-height: calc(100vh - 190px);
      }

      .lightbox-caption {
        flex-direction: column;
        align-items: flex-start;
      }

      .lightbox-hint {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <div class="hero-card">
        <div class="hero-brand">
          <div class="eyebrow">Workspace</div>
        </div>
        <h1>更清晰的临时传输工作台</h1>
        <p>
          文本发送、文件上传、图片预览和下载，一页完成，手机和桌面都顺手。
        </p>
        <div class="hero-actions">
          <div class="pill">文本快速投递</div>
          <div class="pill">图片预览</div>
          <div class="pill">安全下载</div>
          <div class="pill">响应式布局</div>
        </div>
      </div>

      <aside class="status-card">
        <div>
          <h2>当前空间</h2>
          <p>上传文件、投递文本、删除历史内容，所有原有核心能力都保留在同一页面中。</p>
          <div class="stats">
            <div class="stat">
              <strong id="stat-total">0</strong>
              <span>总项目</span>
            </div>
            <div class="stat">
              <strong id="stat-text">0</strong>
              <span>文本条目</span>
            </div>
            <div class="stat">
              <strong id="stat-file">0</strong>
              <span>文件数量</span>
            </div>
          </div>
        </div>
        <div class="status-actions">
          <div class="theme-switcher" role="group" aria-label="外观模式">
            <button class="theme-option" type="button" data-theme-option="light" aria-pressed="false">浅色</button>
            <button class="theme-option" type="button" data-theme-option="dark" aria-pressed="false">深色</button>
            <button class="theme-option" type="button" data-theme-option="system" aria-pressed="false">跟随系统</button>
          </div>
          <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
      </aside>
    </section>

    <div class="error-message" id="error-message"></div>

    <section class="composer">
      <div class="composer-top">
        <div>
          <h2>新建内容</h2>
          <p>支持保留粘贴内容的换行和空格，粘贴后直接按回车即可发送。</p>
        </div>
      </div>

      <div class="composer-form">
        <textarea class="text-input" placeholder="粘贴文本内容，换行和空格会尽量按原样保留"></textarea>
        <div class="composer-actions">
          <div class="file-upload">
            <input type="file" id="file-input">
            <label class="upload-label" for="file-input" id="upload-label">选择文件</label>
          </div>
          <button class="composer-submit" id="submit-text-btn" type="button">发送文本</button>
        </div>
      </div>
      <div class="selected-file" id="selected-file"></div>
    </section>

    <div class="toolbar">
      <div>
        <h3>内容列表</h3>
        <span id="toolbar-summary">正在加载内容...</span>
      </div>
      <div class="toolbar-actions">
        <button class="refresh-btn" id="refresh-btn" type="button">刷新列表</button>
        <button class="clear-btn" id="clear-btn" type="button">清空列表</button>
      </div>
    </div>

    <div class="content-grid" id="content-grid"></div>
  </div>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lightbox-panel" role="dialog" aria-modal="true" aria-labelledby="lightbox-title">
      <button class="lightbox-close" id="lightbox-close" type="button" aria-label="关闭预览">&times;</button>
      <figure class="lightbox-figure">
        <div class="lightbox-image-wrap">
          <img class="lightbox-image" id="lightbox-image" alt="">
        </div>
        <figcaption class="lightbox-caption">
          <div>
            <strong id="lightbox-title"></strong>
            <span id="lightbox-size"></span>
          </div>
          <span class="lightbox-hint">点击空白处或按 Esc 关闭</span>
        </figcaption>
      </figure>
    </div>
  </div>

  <div class="confirm-modal" id="clear-modal" aria-hidden="true">
    <div class="confirm-panel" role="dialog" aria-modal="true" aria-labelledby="clear-modal-title" aria-describedby="clear-modal-body">
      <button class="confirm-close" id="clear-modal-close" type="button" aria-label="关闭确认弹窗">&times;</button>
      <h2 class="confirm-title" id="clear-modal-title">清空内容列表</h2>
      <p class="confirm-body" id="clear-modal-body">是否清空内容列表？清空后所有文本和文件都会被删除，无法恢复。</p>
      <div class="confirm-actions">
        <button class="confirm-btn confirm-cancel" id="clear-modal-cancel" type="button">取消</button>
        <button class="confirm-btn confirm-danger" id="clear-modal-confirm" type="button">确定清空</button>
      </div>
    </div>
  </div>

  <script>
    const textInput = document.querySelector('.text-input');
    const fileInput = document.getElementById('file-input');
    const uploadLabel = document.getElementById('upload-label');
    const submitTextBtn = document.getElementById('submit-text-btn');
    const selectedFile = document.getElementById('selected-file');
    const contentGrid = document.getElementById('content-grid');
    const errorMessage = document.getElementById('error-message');
    const toolbarSummary = document.getElementById('toolbar-summary');
    const refreshBtn = document.getElementById('refresh-btn');
    const clearBtn = document.getElementById('clear-btn');
    const statTotal = document.getElementById('stat-total');
    const statText = document.getElementById('stat-text');
    const statFile = document.getElementById('stat-file');
    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightbox-image');
    const lightboxTitle = document.getElementById('lightbox-title');
    const lightboxSize = document.getElementById('lightbox-size');
    const lightboxClose = document.getElementById('lightbox-close');
    const clearModal = document.getElementById('clear-modal');
    const clearModalClose = document.getElementById('clear-modal-close');
    const clearModalCancel = document.getElementById('clear-modal-cancel');
    const clearModalConfirm = document.getElementById('clear-modal-confirm');
    const themeButtons = document.querySelectorAll('[data-theme-option]');
    const themeStorageKey = 'some-transfer:theme-mode';
    const themeMediaQuery = window.matchMedia
      ? window.matchMedia('(prefers-color-scheme: dark)')
      : { matches: false, addEventListener() {} };
    const allowedThemes = new Set(['light', 'dark', 'system']);
    const textCryptoSecretStorageKey = 'some-transfer:text-crypto-secret';
    const textCryptoSecretLocalStorageKey = 'some-transfer:text-crypto-secret:v2';
    const encryptedTextPrefix = 'stenc:v1:';
    const encryptedTextSalt = 'some-transfer:text-encryption:v1';
    const encryptedTextIterations = 150000;
    const maxPlainTextLength = 10000;
    let isLoadingItems = false;
    let shouldReloadItems = false;
    let textCryptoKey = null;
    let textCryptoKeyPromise = null;
    let textCryptoSecret = '';
    let pendingTextCryptoSecret = '';
    let clearModalReturnFocus = null;
    let isClearingItems = false;

    function getStoredThemePreference() {
      try {
        const storedTheme = localStorage.getItem(themeStorageKey);
        return allowedThemes.has(storedTheme) ? storedTheme : 'system';
      } catch (error) {
        return 'system';
      }
    }

    function resolveThemePreference(preference) {
      if (preference === 'system') {
        return themeMediaQuery.matches ? 'dark' : 'light';
      }

      return preference;
    }

    function applyThemePreference(preference) {
      const nextPreference = allowedThemes.has(preference) ? preference : 'system';
      document.documentElement.dataset.themePreference = nextPreference;
      document.documentElement.dataset.theme = resolveThemePreference(nextPreference);

      themeButtons.forEach((button) => {
        const isActive = button.dataset.themeOption === nextPreference;
        button.classList.toggle('active', isActive);
        button.setAttribute('aria-pressed', String(isActive));
      });
    }

    function setThemePreference(preference) {
      const nextPreference = allowedThemes.has(preference) ? preference : 'system';
      try {
        localStorage.setItem(themeStorageKey, nextPreference);
      } catch (error) {
        // Ignore storage failures and still apply the current-page theme.
      }
      applyThemePreference(nextPreference);
    }

    function initializeThemeControls() {
      applyThemePreference(getStoredThemePreference());

      themeButtons.forEach((button) => {
        button.addEventListener('click', () => {
          setThemePreference(button.dataset.themeOption);
        });
      });

      const handleSystemThemeChange = () => {
        if (getStoredThemePreference() === 'system') {
          applyThemePreference('system');
        }
      };

      if (typeof themeMediaQuery.addEventListener === 'function') {
        themeMediaQuery.addEventListener('change', handleSystemThemeChange);
      } else if (typeof themeMediaQuery.addListener === 'function') {
        themeMediaQuery.addListener(handleSystemThemeChange);
      }
    }

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.style.display = 'block';
      clearTimeout(showError.timer);
      showError.timer = setTimeout(() => {
        errorMessage.style.display = 'none';
      }, 5000);
    }

    async function handleResponse(response) {
      if (response.status === 401) {
        window.location.href = '/';
        return null;
      }
      if (!response.ok) {
        const data = await response.json().catch(() => ({ error: '请求失败' }));
        throw new Error(data.error || '请求失败');
      }
      return response.json();
    }

    function readStoredTextCryptoSecret() {
      const sessionSecret = sessionStorage.getItem(textCryptoSecretStorageKey) || '';
      if (sessionSecret) {
        return sessionSecret;
      }

      const localSecret = localStorage.getItem(textCryptoSecretLocalStorageKey) || '';
      if (localSecret) {
        sessionStorage.setItem(textCryptoSecretStorageKey, localSecret);
      }

      return localSecret;
    }

    function getTextCryptoSecret() {
      return readStoredTextCryptoSecret();
    }

    function clearTextCryptoSecret() {
      sessionStorage.removeItem(textCryptoSecretStorageKey);
      localStorage.removeItem(textCryptoSecretLocalStorageKey);
      textCryptoKey = null;
      textCryptoKeyPromise = null;
      textCryptoSecret = '';
      pendingTextCryptoSecret = '';
    }

    function ensureTextCryptoSupport() {
      if (!window.crypto || !window.crypto.subtle) {
        throw new Error('当前浏览器环境不支持文本加密，请使用 HTTPS 或 localhost 访问');
      }
    }

    async function getTextCryptoKey() {
      ensureTextCryptoSupport();

      const secret = getTextCryptoSecret();
      if (!secret) {
        throw new Error('缺少 Pin 码，请先重新登录');
      }

      if (textCryptoKey && textCryptoSecret === secret) {
        return textCryptoKey;
      }

      if (textCryptoKeyPromise && pendingTextCryptoSecret === secret) {
        return textCryptoKeyPromise;
      }

      const encoder = new TextEncoder();
      pendingTextCryptoSecret = secret;
      textCryptoKeyPromise = (async () => {
        const baseKey = await crypto.subtle.importKey(
          'raw',
          encoder.encode(secret),
          'PBKDF2',
          false,
          ['deriveKey']
        );

        const derivedKey = await crypto.subtle.deriveKey(
          {
            name: 'PBKDF2',
            salt: encoder.encode(encryptedTextSalt),
            iterations: encryptedTextIterations,
            hash: 'SHA-256'
          },
          baseKey,
          { name: 'AES-GCM', length: 256 },
          false,
          ['encrypt', 'decrypt']
        );

        textCryptoKey = derivedKey;
        textCryptoSecret = secret;
        return derivedKey;
      })();

      try {
        return await textCryptoKeyPromise;
      } finally {
        if (pendingTextCryptoSecret === secret) {
          pendingTextCryptoSecret = '';
          textCryptoKeyPromise = null;
        }
      }
    }

    function bytesToBase64Url(bytes) {
      const chunkSize = 0x8000;
      let binary = '';
      for (let index = 0; index < bytes.length; index += chunkSize) {
        binary += String.fromCharCode(...bytes.subarray(index, index + chunkSize));
      }
      return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
    }

    function base64UrlToBytes(value) {
      const base64 = value.replace(/-/g, '+').replace(/_/g, '/').padEnd(Math.ceil(value.length / 4) * 4, '=');
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }
      return bytes;
    }

    function isEncryptedText(content) {
      return typeof content === 'string' && content.startsWith(encryptedTextPrefix);
    }

    async function encryptTextContent(text) {
      const key = await getTextCryptoKey();
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const plaintext = new TextEncoder().encode(text);
      const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, plaintext);
      return `${encryptedTextPrefix}${bytesToBase64Url(iv)}:${bytesToBase64Url(new Uint8Array(encrypted))}`;
    }

    async function decryptTextContent(content) {
      const parts = content.split(':');
      if (parts.length !== 4 || parts[0] !== 'stenc' || parts[1] !== 'v1') {
        throw new Error('加密文本格式无效');
      }

      const key = await getTextCryptoKey();
      const iv = base64UrlToBytes(parts[2]);
      const ciphertext = base64UrlToBytes(parts[3]);
      const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
      return new TextDecoder().decode(decrypted);
    }

    function updateStats(items) {
      const textCount = items.filter(item => item.type === 'text').length;
      const fileCount = items.filter(item => item.type === 'file').length;

      statTotal.textContent = String(items.length);
      statText.textContent = String(textCount);
      statFile.textContent = String(fileCount);

      if (items.length === 0) {
        toolbarSummary.textContent = '这里还是空的，发一条文本或上传一个文件试试。';
      } else {
        toolbarSummary.textContent = `共 ${items.length} 条内容，其中 ${textCount} 条文本、${fileCount} 个文件。`;
      }
    }

    async function logout() {
      try {
        const response = await fetch('/logout', { method: 'POST' });
        if (response.ok) {
          clearTextCryptoSecret();
          window.location.href = '/';
        }
      } catch (error) {
        showError('退出登录失败');
      }
    }

    async function loadItems() {
      if (isLoadingItems) {
        shouldReloadItems = true;
        return;
      }

      isLoadingItems = true;
      shouldReloadItems = false;
      refreshBtn.disabled = true;
      refreshBtn.textContent = '刷新中...';

      try {
        const response = await fetch('/api/items', { cache: 'no-store' });
        const data = await handleResponse(response);
        if (data) {
          contentGrid.innerHTML = '';
          contentGrid.classList.toggle('is-empty', data.length === 0);
          updateStats(data);

          if (data.length === 0) {
            contentGrid.innerHTML = '<div class="empty-state">暂无内容。<br>你可以先发送一段文本，或者上传一个文件作为起点。</div>';
          } else {
            const fragment = document.createDocumentFragment();
            data.forEach(item => {
              fragment.appendChild(renderItem(item));
            });
            contentGrid.appendChild(fragment);
          }
        }
      } catch (error) {
        showError('加载内容失败: ' + error.message);
      } finally {
        isLoadingItems = false;
        refreshBtn.disabled = false;
        refreshBtn.textContent = '刷新列表';
        if (shouldReloadItems) {
          loadItems();
        }
      }
    }

    async function clearItems() {
      if (isClearingItems) {
        return;
      }

      openClearModal();
    }

    async function confirmClearItems() {
      if (isClearingItems) {
        return;
      }

      isClearingItems = true;
      clearBtn.disabled = true;
      clearBtn.textContent = '清空中...';
      clearModalConfirm.disabled = true;
      clearModalCancel.disabled = true;
      clearModalClose.disabled = true;

      try {
        const response = await fetch('/api/items', {
          method: 'DELETE'
        });
        const data = await handleResponse(response);
        if (data) {
          closeClearModal();
          await loadItems();
        }
      } catch (error) {
        showError('清空失败: ' + error.message);
        closeClearModal();
      } finally {
        isClearingItems = false;
        clearBtn.disabled = false;
        clearBtn.textContent = '清空列表';
        clearModalConfirm.disabled = false;
        clearModalCancel.disabled = false;
        clearModalClose.disabled = false;
      }
    }

    function isImageFile(filename) {
      const imageExtensions = ['.jpg', '.jpeg', '.png', '.gif', '.bmp', '.webp'];
      const ext = filename.toLowerCase().substring(filename.lastIndexOf('.'));
      return imageExtensions.includes(ext);
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(2) + ' KB';
      return (bytes / 1048576).toFixed(2) + ' MB';
    }

    function shouldShowExpandButton(text) {
      return text.length > 520 || text.split('\n').length > 10;
    }

    function openLightbox({ src, filename, size }) {
      lightboxImage.src = src;
      lightboxImage.alt = filename;
      lightboxTitle.textContent = filename;
      lightboxSize.textContent = `大小: ${formatSize(size)}`;
      lightbox.classList.add('visible');
      lightbox.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('visible');
      lightbox.setAttribute('aria-hidden', 'true');
      lightboxImage.src = '';
      lightboxImage.alt = '';
      document.body.style.overflow = '';
    }

    function openClearModal() {
      clearModalReturnFocus = document.activeElement instanceof HTMLElement ? document.activeElement : null;
      clearModal.classList.add('visible');
      clearModal.setAttribute('aria-hidden', 'false');
      clearModalConfirm.focus();
      document.body.style.overflow = 'hidden';
    }

    function closeClearModal() {
      clearModal.classList.remove('visible');
      clearModal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      if (clearModalReturnFocus) {
        clearModalReturnFocus.focus();
      }
      clearModalReturnFocus = null;
    }

    async function copyText(text, btn) {
      try {
        await navigator.clipboard.writeText(text);
        btn.textContent = '已复制';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '复制文本';
          btn.classList.remove('copied');
        }, 2000);
      } catch (error) {
        showError('复制失败');
      }
    }

    function renderItem(item) {
      const itemElement = document.createElement('div');
      itemElement.className = 'item';

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'delete-btn';
      deleteBtn.textContent = '删除';
      deleteBtn.onclick = () => deleteItem(item.id);
      itemElement.appendChild(deleteBtn);

      const badge = document.createElement('div');
      badge.className = 'item-badge';
      badge.textContent = item.type === 'text' ? 'Text Snippet' : 'File Asset';
      itemElement.appendChild(badge);

      if (item.type === 'text') {
        const textContent = renderTextContent('');
        itemElement.appendChild(textContent);

        const actions = document.createElement('div');
        actions.className = 'item-actions';

        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        actions.appendChild(copyBtn);

        const expandBtn = document.createElement('button');
        expandBtn.className = 'expand-btn';
        actions.appendChild(expandBtn);

        const applyPlainText = (text) => {
          textContent.textContent = text;
          textContent.classList.remove('expanded');
          copyBtn.disabled = false;
          copyBtn.textContent = '复制文本';
          copyBtn.onclick = () => copyText(text, copyBtn);
          expandBtn.classList.toggle('visible', shouldShowExpandButton(text));
          expandBtn.textContent = '展开全文';
          expandBtn.onclick = () => {
            textContent.classList.toggle('expanded');
            expandBtn.textContent = textContent.classList.contains('expanded') ? '收起内容' : '展开全文';
          };
        };

        const showEncryptedTextLocked = (message = '文本已加密，登录后会自动解密。') => {
          textContent.textContent = message;
          textContent.classList.remove('expanded');
          copyBtn.disabled = true;
          copyBtn.textContent = '等待解密';
          copyBtn.onclick = null;
          expandBtn.classList.remove('visible');
          expandBtn.onclick = null;
        };

        if (item.encrypted || isEncryptedText(item.content)) {
          badge.textContent = 'Encrypted Text';
          copyBtn.disabled = true;
          copyBtn.textContent = '解密中...';

          if (getTextCryptoSecret()) {
            decryptTextContent(item.content)
              .then(applyPlainText)
              .catch(() => {
                clearTextCryptoSecret();
                showEncryptedTextLocked('文本已加密，当前 PIN 不可用。请重新登录后再试。');
              });
          } else {
            showEncryptedTextLocked();
          }
        } else {
          applyPlainText(item.content);
        }

        itemElement.appendChild(actions);
      } else if (item.type === 'file') {
        const fileContent = document.createElement('div');
        fileContent.className = 'item-file';

        const fileMeta = document.createElement('div');
        fileMeta.className = 'file-meta';

        const fileName = document.createElement('strong');
        fileName.textContent = item.filename;
        fileMeta.appendChild(fileName);

        const fileSize = document.createElement('div');
        fileSize.textContent = `大小: ${formatSize(item.size)}`;
        fileMeta.appendChild(fileSize);
        fileContent.appendChild(fileMeta);

        const fileActions = document.createElement('div');
        fileActions.className = 'file-actions';

        if (isImageFile(item.filename)) {
          const previewBtn = document.createElement('button');
          previewBtn.type = 'button';
          previewBtn.className = 'image-preview-btn';
          previewBtn.textContent = '预览图片';
          previewBtn.onclick = () => openLightbox({
            src: `/preview/${item.filepath}`,
            filename: item.filename,
            size: item.size
          });
          fileActions.appendChild(previewBtn);
        }

        const downloadLink = document.createElement('a');
        downloadLink.href = `/download/${item.filepath}`;
        downloadLink.className = 'file-download';
        downloadLink.download = item.filename;
        downloadLink.textContent = '下载文件';
        fileActions.appendChild(downloadLink);
        fileContent.appendChild(fileActions);

        itemElement.appendChild(fileContent);
      }

      const timeElement = document.createElement('div');
      timeElement.className = 'item-time';
      timeElement.textContent = new Date(item.timestamp).toLocaleString();
      itemElement.appendChild(timeElement);

      return itemElement;
    }

    function renderTextContent(text) {
      const textContent = document.createElement('div');
      textContent.className = 'item-text';
      textContent.textContent = text;

      return textContent;
    }

    async function submitText() {
      const text = textInput.value.replace(/\r\n/g, '\n');
      if (!text.trim()) {
        showError('请输入文本内容后再发送');
        return;
      }

      if (text.length > maxPlainTextLength) {
        showError('文本内容过长');
        return;
      }

      submitTextBtn.disabled = true;
      submitTextBtn.textContent = '加密中...';

      try {
        const encryptedText = await encryptTextContent(text);
        submitTextBtn.textContent = '发送中...';
        const response = await fetch('/api/items/text', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            text: encryptedText,
            encrypted: true
          })
        });
        const data = await handleResponse(response);
        if (data) {
          textInput.value = '';
          await loadItems();
        }
      } catch (error) {
        showError('提交文本失败: ' + error.message);
      } finally {
        submitTextBtn.disabled = false;
        submitTextBtn.textContent = '发送文本';
      }
    }

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) {
        selectedFile.textContent = '';
        return;
      }

      selectedFile.textContent = `已选择: ${file.name}`;
      uploadLabel.classList.add('disabled');
      uploadLabel.textContent = '上传中...';

      const formData = new FormData();
      formData.append('file', file);

      try {
        const response = await fetch('/api/items/file', {
          method: 'POST',
          body: formData
        });
        const data = await handleResponse(response);
        if (data) {
          fileInput.value = '';
          selectedFile.textContent = '';
          await loadItems();
        }
      } catch (error) {
        showError('上传文件失败: ' + error.message);
      } finally {
        uploadLabel.classList.remove('disabled');
        uploadLabel.textContent = '选择文件';
      }
    });

    async function deleteItem(id) {
      try {
        const response = await fetch(`/api/items/${id}`, {
          method: 'DELETE'
        });
        await handleResponse(response);
        loadItems();
      } catch (error) {
        showError('删除失败: ' + error.message);
      }
    }

    textInput.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        submitText();
      }
    });

    submitTextBtn.addEventListener('click', submitText);
    refreshBtn.addEventListener('click', loadItems);
    clearBtn.addEventListener('click', clearItems);
    clearModalClose.addEventListener('click', closeClearModal);
    clearModalCancel.addEventListener('click', closeClearModal);
    clearModalConfirm.addEventListener('click', confirmClearItems);
    clearModal.addEventListener('click', (event) => {
      if (event.target === clearModal) {
        closeClearModal();
      }
    });
    lightboxClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (event) => {
      if (event.target === lightbox) {
        closeLightbox();
      }
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && clearModal.classList.contains('visible')) {
        closeClearModal();
        return;
      }
      if (event.key === 'Escape' && lightbox.classList.contains('visible')) {
        closeLightbox();
      }
    });

    initializeThemeControls();
    loadItems();
  </script>
</body>
</html>
