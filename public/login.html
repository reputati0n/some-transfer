<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文件分享系统 - 登录</title>
  <link rel="icon" type="image/svg+xml" href="/assets/app-icon.svg">
  <link rel="apple-touch-icon" href="/assets/app-icon.svg">
  <style>
    :root {
      --bg: #f3efe7;
      --panel: rgba(255, 251, 245, 0.88);
      --panel-border: rgba(112, 89, 56, 0.14);
      --text: #1d1b18;
      --muted: #6c655c;
      --accent: #c96f3b;
      --accent-strong: #ab5422;
      --shadow: 0 28px 80px rgba(61, 42, 22, 0.16);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(214, 134, 80, 0.22), transparent 30%),
        radial-gradient(circle at bottom right, rgba(88, 117, 156, 0.18), transparent 35%),
        linear-gradient(135deg, #f8f3eb 0%, #efe8de 45%, #e9e4dc 100%);
      padding: 24px;
    }

    .page-shell {
      width: min(1080px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 24px;
      align-items: stretch;
    }

    .intro-panel,
    .login-panel {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .intro-panel {
      padding: 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 36px;
      min-height: 620px;
    }

    .intro-panel::before,
    .login-panel::before {
      content: "";
      position: absolute;
      inset: auto auto 0 0;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(201, 111, 59, 0.18), transparent 70%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(112, 89, 56, 0.1);
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(201, 111, 59, 0.12);
    }

    .brand-row {
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(40px, 5vw, 68px);
      line-height: 0.96;
      letter-spacing: -0.05em;
    }

    .lead {
      max-width: 34rem;
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.75;
    }

    .feature-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 0;
    }

    .feature {
      padding: 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(112, 89, 56, 0.08);
    }

    .feature strong {
      display: block;
      font-size: 16px;
      margin-bottom: 6px;
    }

    .feature span {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .login-panel {
      padding: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 620px;
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: min(420px, 100%);
      padding: 34px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(112, 89, 56, 0.08);
      box-shadow: 0 18px 40px rgba(61, 42, 22, 0.1);
    }

    .login-card h2 {
      margin: 0 0 10px;
      font-size: 32px;
      letter-spacing: -0.04em;
    }

    .login-card p {
      margin: 0 0 28px;
      color: var(--muted);
      line-height: 1.7;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      margin-bottom: 10px;
      font-size: 14px;
      color: var(--muted);
    }

    input[type="password"] {
      width: 100%;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid rgba(112, 89, 56, 0.14);
      background: rgba(255, 255, 255, 0.9);
      font-size: 16px;
      color: var(--text);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
      outline: none;
    }

    input[type="password"]:focus {
      border-color: rgba(201, 111, 59, 0.7);
      box-shadow: 0 0 0 5px rgba(201, 111, 59, 0.12);
      transform: translateY(-1px);
    }

    button {
      width: 100%;
      padding: 16px 20px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 20px 34px rgba(171, 84, 34, 0.22);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 24px 40px rgba(171, 84, 34, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.72;
      cursor: wait;
    }

    .error {
      min-height: 24px;
      margin-top: 16px;
      color: #b53920;
      font-size: 14px;
    }

    .helper {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid rgba(112, 89, 56, 0.1);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    @media (max-width: 920px) {
      body {
        display: block;
      }

      .page-shell {
        grid-template-columns: 1fr;
      }

      .intro-panel,
      .login-panel {
        min-height: auto;
      }

      .intro-panel {
        padding: 32px;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .intro-panel,
      .login-panel {
        border-radius: 24px;
      }

      .intro-panel {
        padding: 24px;
      }

      .feature-list {
        grid-template-columns: 1fr;
      }

      .login-panel {
        padding: 18px;
      }

      .login-card {
        padding: 26px 22px;
        border-radius: 22px;
      }

      h1 {
        font-size: 42px;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="intro-panel">
      <div>
        <div class="brand-row">
          <div class="eyebrow">Private Transfer Hub</div>
        </div>
        <h1>更轻巧的私有文件中转站</h1>
        <p class="lead">
          保留原有核心能力，发文本、传文件、预览和下载都更顺手。
        </p>
      </div>

      <div class="feature-list">
        <div class="feature">
          <strong>快速登录</strong>
          <span>输入 Pin 码即可进入，无需额外注册和复杂流程。</span>
        </div>
        <div class="feature">
          <strong>跨设备查看</strong>
          <span>响应式布局会自动适配手机、平板和桌面屏幕。</span>
        </div>
        <div class="feature">
          <strong>图片预览</strong>
          <span>上传图片后可直接在页面内预览，再决定是否下载。</span>
        </div>
        <div class="feature">
          <strong>私有空间</strong>
          <span>内容只在登录会话下可见，保留你当前的使用方式。</span>
        </div>
      </div>
    </section>

    <section class="login-panel">
      <div class="login-card">
        <h2>欢迎回来</h2>
        <p>继续访问你的文本与文件投递面板。</p>

        <form id="login-form">
          <div class="field">
            <label for="pin-input">Pin 码</label>
            <input id="pin-input" type="password" name="pin" placeholder="请输入 Pin 码" required autocomplete="current-password">
          </div>
          <button type="submit">进入文件面板</button>
        </form>

        <div class="error" id="error-message"></div>
        <div class="helper">
          登录后你可以继续使用文本投递、文件上传、下载与删除等全部原有功能。
        </div>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const errorMessage = document.getElementById('error-message');
    const submitButton = form.querySelector('button');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMessage.textContent = '';
      submitButton.disabled = true;
      submitButton.textContent = '正在验证...';

      const formData = new FormData(e.target);
      const pin = formData.get('pin');

      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
          },
          body: `pin=${encodeURIComponent(pin)}`
        });

        if (response.ok) {
          window.location.href = '/index.html';
        } else {
          const data = await response.json().catch(() => null);
          errorMessage.textContent = data && data.message ? data.message : 'Pin码错误';
        }
      } catch (error) {
        errorMessage.textContent = '登录失败，请稍后重试';
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = '进入文件面板';
      }
    });
  </script>
</body>
</html>
